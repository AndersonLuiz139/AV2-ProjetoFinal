# =============================================================================
# SoundList — application.properties
# Configuração ativa: H2 em memória (desenvolvimento)
# =============================================================================

spring.application.name=soundlist

# -----------------------------------------------------------------------------
# H2 — Banco em memória
# O banco é recriado a cada reinicialização da aplicação.
# -----------------------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:soundlistdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console web do H2 — acessível em http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# -----------------------------------------------------------------------------
# JPA / Hibernate
# create-drop: cria o schema ao iniciar e derruba ao encerrar (ideal para dev)
# update:      atualiza o schema sem apagar dados existentes
# -----------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Carrega dados de exemplo ao iniciar (src/main/resources/data.sql)
spring.sql.init.mode=always

